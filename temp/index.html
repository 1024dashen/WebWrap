        <script>
            !(function () {
                const B_KEY = 'ls_backup',
                    T = 10000,
                    D = 365
                const setC = (n, v, d) => {
                    let t = new Date()
                    t.setTime(t.getTime() + d * 86400000)
                    document.cookie = `${n}=${encodeURIComponent(v)};expires=${t.toUTCString()};path=/`
                }
                const getC = (n) =>
                    document.cookie.split('; ').reduce((s, i) => {
                        let [k, v] = i.split('=')
                        return k === n ? decodeURIComponent(v || '') : s
                    }, '')
                ;(() => {
                    let c = getC(B_KEY)
                    try {
                        let o = JSON.parse(c)
                        !localStorage.length &&
                            Object.keys(o).forEach((k) =>
                                localStorage.setItem(k, o[k]),
                            )
                    } catch (e) {}
                })()
                setInterval(() => {
                    if (localStorage.length)
                        setC(B_KEY, JSON.stringify(localStorage), D)
                }, T)
            })()
        </script>

        <script>
            ;(function () {
                function setProgress(p) {
                    var bar = document.getElementById('splash-bar')
                    if (bar)
                        bar.style.width =
                            Math.max(0, Math.min(1, p)) * 100 + '%'
                }
                function setTip(text) {
                    var tip = document.getElementById('splash-tip')
                    if (tip) tip.textContent = text
                }
                function hideSplash() {
                    var sp = document.getElementById('splash')
                    if (sp) {
                        sp.style.opacity = '0'
                        setTimeout(function () {
                            sp.style.display = 'none'
                        }, 500)
                    }
                }
                function showError(msg) {
                    var el = document.getElementById('err')
                    if (!el) return
                    el.style.display = 'flex'
                    el.textContent = String(msg)
                }
                window.onSplashProgress = setProgress
                window.hideSplashScreen = function () {
                    setProgress(1)
                    setTimeout(hideSplash, 200)
                }
                window.addEventListener('error', function (ev) {
                    console.error('[global error]', ev.error || ev.message)
                })
                window.addEventListener('unhandledrejection', function (ev) {
                    console.error('[unhandled rejection]', ev.reason)
                })
                var tryHook = function () {
                    if (window.Laya && window.Laya.loader && !tryHook._done) {
                        tryHook._done = true
                        window.Laya.loader.on('progress', null, function (p) {
                            setProgress(p)
                        })
                    } else {
                        setTimeout(tryHook, 50)
                    }
                }
                tryHook()
            })()
        </script>

        <script>
            document.getElementById('openGMPageBtn').onclick = function () {
                sessionStorage.setItem('needReloadAfterGM', '1')
                window.open('gm.html', '_blank')
            }
            document.addEventListener('visibilitychange', function () {
                if (
                    !document.hidden &&
                    sessionStorage.getItem('needReloadAfterGM') === '1'
                ) {
                    sessionStorage.removeItem('needReloadAfterGM')
                    location.reload()
                }
            })
